kind = "web"
previewPath = "/"
title = "Naura Innovation Lab"
version = "1.0.0"
id = "artifacts/naura-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26136

[services.development]
run = "pnpm --filter @workspace/naura-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/naura-website", "run", "build" ]
publicDir = "artifacts/naura-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26136"
BASE_PATH = "/"
