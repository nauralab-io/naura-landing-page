<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Naura Innovation Lab</title>

    <!-- Favicon (browser tab logo) -->
    <link rel="icon" type="image/png" href="assets/Naura_Logos_Naura_Symbol_Black.svg" />

    <!-- Open Graph (for link previews on WhatsApp, Discord, etc.) -->
    <meta property="og:title" content="Naura Innovation Lab" />
    <meta property="og:description" content="We're building something exciting. Almost ready!" />
    <meta property="og:image" content="assets/Naura_Logos_Naura_Symbol_Black.svg" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card (X preview) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Naura Innovation Lab" />
    <meta name="twitter:description" content="We're building something exciting. Almost ready!" />
    <meta name="twitter:image" content="assets/Naura_Logos_Naura_Symbol_Black.svg" />

    <!-- Optional theme color (mobile browser UI) -->
    <meta name="theme-color" content="#424be8" />

    <style>
        :root {
            --bg: #030303;
            --highlight: #424be8;

            --pink: #fba3fa;
            --green: #80ff92;
            --red: #f71717;

            --detail: #e9ff8d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: white;
            font-family: Inter, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background glow */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                    radial-gradient(circle at 20% 30%, rgba(66, 75, 232, 0.25), transparent 30%),
                    radial-gradient(circle at 80% 70%, rgba(251, 163, 250, 0.15), transparent 25%);
            pointer-events: none;
        }

        .container {
            text-align: center;
            max-width: 700px;
            padding: 3rem;
            position: relative;
            z-index: 1;
        }

        .logo-mark {
            width: 90px;
            height: 90px;
            margin: 0 auto 2rem;
            border-radius: 24px;
            overflow: hidden; /* important for clipping video */
            background: linear-gradient(135deg, var(--highlight), var(--pink));
            box-shadow: 0 0 30px rgba(66, 75, 232, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-mark video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* keeps it nicely cropped */
            display: block;
        }

        h1 {
            font-size: 4rem;
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        .accent {
            color: var(--pink);
        }

        p {
            color: #d0d0d0;
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 22px;
            border: 1px solid rgba(128, 255, 146, 0.4);
            border-radius: 999px;
            background: rgba(128, 255, 146, 0.08);
            color: var(--green);
            font-weight: 600;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
        }

        .details {
            margin-top: 3rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .tag {
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .tag-blue {
            background: rgba(66, 75, 232, 0.15);
            color: var(--highlight);
            border: 1px solid rgba(66, 75, 232, 0.3);
        }

        .tag-yellow {
            background: rgba(233, 255, 141, 0.08);
            color: var(--detail);
            border: 1px solid rgba(233, 255, 141, 0.25);
        }

        .tag-red {
            background: rgba(247, 23, 23, 0.08);
            color: var(--red);
            border: 1px solid rgba(247, 23, 23, 0.25);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            p {
                font-size: 1rem;
            }

            .container {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo-mark">
        <video autoplay muted loop playsinline>
            <source src="assets/logo_animated.mp4" type="video/mp4" />
        </video>
    </div>

    <h1>
        Under Construction
        <span class="accent">.</span>
    </h1>

    <p>
        We're building something exciting.
        <br />
        <strong style="color:#e9ff8d;">Almost ready!</strong>
    </p>

    <div class="status">
        <span class="dot"></span>
        Launching Soon
    </div>

    <div class="details">
        <div class="tag tag-blue">Design Complete</div>
        <div class="tag tag-yellow">Final Touches</div>
        <div class="tag tag-red">Work In Progress</div>
    </div>
</div>
</body>
</html>
